<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- App icon container -->
  <rect x="4" y="4" width="192" height="192" rx="36" ry="36" fill="#1e1e2e"/>

  <!-- Grid levels -->
  <line x1="28" y1="40" x2="172" y2="40" stroke="#6c7086" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="28" y1="65" x2="172" y2="65" stroke="#6c7086" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="28" y1="90" x2="172" y2="90" stroke="#6c7086" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="28" y1="115" x2="172" y2="115" stroke="#6c7086" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="28" y1="140" x2="172" y2="140" stroke="#6c7086" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="28" y1="165" x2="172" y2="165" stroke="#6c7086" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- Price line -->
  <polyline
    points="28,140 52,65 76,115 100,40 124,90 148,40 172,90"
    fill="none"
    stroke="#89b4fa"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.8"
  />

  <!-- BUY filled triangles (green, pointing up) -->
  <polygon points="28,148 23,156 33,156" fill="#a6e3a1" opacity="0.9"/>
  <polygon points="76,123 71,131 81,131" fill="#a6e3a1" opacity="0.9"/>
  <polygon points="124,98 119,106 129,106" fill="#a6e3a1" opacity="0.9"/>
  <polygon points="172,98 167,106 177,106" fill="#a6e3a1" opacity="0.9"/>

  <!-- SELL filled triangles (red, pointing down) -->
  <polygon points="52,57 47,49 57,49" fill="#f38ba8" opacity="0.9"/>
  <polygon points="100,32 95,24 105,24" fill="#f38ba8" opacity="0.9"/>
  <polygon points="148,32 143,24 153,24" fill="#f38ba8" opacity="0.9"/>
</svg>
