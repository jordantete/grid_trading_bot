[theme]
name = "material"
palette.scheme = "slate"
palette.primary = "indigo"
palette.accent = "amber"
features = [
    "navigation.tabs",
    "navigation.sections",
    "navigation.top",
    "search.suggest",
    "content.code.copy",
]

[theme.icon]
repo = "fontawesome/brands/github"

[[markdown_extensions]]
name = "admonition"

[[markdown_extensions]]
name = "toc"

[markdown_extensions.config]
permalink = true

[[markdown_extensions]]
name = "pymdownx.superfences"

[[markdown_extensions.config.custom_fences]]
name = "mermaid"
class = "mermaid"
format_name = "fence_mermaid"

[[markdown_extensions]]
name = "pymdownx.tabbed"

[markdown_extensions.config]
alternate_style = true

[[markdown_extensions]]
name = "pymdownx.highlight"

[markdown_extensions.config]
anchor_linenums = true

[[markdown_extensions]]
name = "pymdownx.tasklist"

[markdown_extensions.config]
custom_checkbox = true
