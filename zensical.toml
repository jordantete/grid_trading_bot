[project]
site_name = "Grid Trading Bot"
site_url = "https://jordantete.github.io/grid_trading_bot/"
repo_url = "https://github.com/jordantete/grid_trading_bot"
repo_name = "jordantete/grid_trading_bot"
site_description = "Open-source cryptocurrency grid trading bot for backtesting, paper trading, and live trading."

nav = [
  {"Home" = "index.md"},
  {"Quick Start" = "quick-start.md"},
  {"Concepts" = [
    "concepts/grid-trading.md"
  ]},
  {"Configuration" = [
    "configuration/config-file.md",
    "configuration/environment-variables.md"
  ]},
  {"Usage" = [
    "usage/cli.md"
  ]},
  {"Monitoring" = [
    "monitoring/setup.md",
    "monitoring/grafana-dashboard.md"
  ]},
  {"Architecture" = [
    "architecture/overview.md"
  ]},
  {"Contributing" = [
    "contributing/guide.md"
  ]}
]

[project.theme]
features = [
    "navigation.tabs",
    "navigation.sections",
    "navigation.top",
    "search.suggest",
    "content.code.copy",
]

[project.theme.palette]
scheme = "slate"
primary = "indigo"
accent = "amber"

[project.theme.icon]
repo = "fontawesome/brands/github"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"
