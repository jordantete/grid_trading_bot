server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: debug

positions:
  filename: /tmp/positions.yaml

clients:
  - url: "http://loki:3100/loki/api/v1/push"
    batchsize: 1
    batchwait: 1s

scrape_configs:
  - job_name: bot_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: grid_trading_bot
          __path__: /logs/**/*.log

    relabel_configs:
      - source_labels: [__path__]
        regex: '.*/bot_([A-Z]+)_([A-Z]+)_([A-Z_]+)_strategy([A-Z_]+)_spacing([A-Z]+)_size(\d+)_range(\d+-\d+)_.*\.log$'
        target_label: base_currency
        replacement: $1
      - source_labels: [__path__]
        regex: '.*/bot_([A-Z]+)_([A-Z]+)_([A-Z_]+)_strategy([A-Z_]+)_spacing([A-Z]+)_size(\d+)_range(\d+-\d+)_.*\.log$'
        target_label: quote_currency
        replacement: $2
      - source_labels: [__path__]
        regex: '.*/bot_([A-Z]+)_([A-Z]+)_([A-Z_]+)_strategy([A-Z_]+)_spacing([A-Z]+)_size(\d+)_range(\d+-\d+)_.*\.log$'
        target_label: trading_mode
        replacement: $3
      - source_labels: [__path__]
        regex: '.*/bot_([A-Z]+)_([A-Z]+)_([A-Z_]+)_strategy([A-Z_]+)_spacing([A-Z]+)_size(\d+)_range(\d+-\d+)_.*\.log$'
        target_label: strategy_type
        replacement: $4
      - source_labels: [__path__]
        regex: '.*/bot_([A-Z]+)_([A-Z]+)_([A-Z_]+)_strategy([A-Z_]+)_spacing([A-Z]+)_size(\d+)_range(\d+-\d+)_.*\.log$'
        target_label: spacing_type
        replacement: $5
      - source_labels: [__path__]
        regex: '.*/bot_([A-Z]+)_([A-Z]+)_([A-Z_]+)_strategy([A-Z_]+)_spacing([A-Z]+)_size(\d+)_range(\d+-\d+)_.*\.log$'
        target_label: grid_size
        replacement: $6
      - source_labels: [__path__]
        regex: '.*/bot_([A-Z]+)_([A-Z]+)_([A-Z_]+)_strategy([A-Z_]+)_spacing([A-Z]+)_size(\d+)_range(\d+-\d+)_.*\.log$'
        target_label: grid_range
        replacement: $7
      # Derived label: trading_pair = "SOL/USDT"
      - source_labels: [base_currency, quote_currency]
        separator: /
        target_label: trading_pair

    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d{3}) - (?P<service>[A-Za-z0-9_]+) - (?P<level>[A-Z]+) - (?P<log_message>.*)$'

      - labels:
          service: '{{ .service }}'
          level: '{{ .level }}'

      # Convert timestamp to Loki format
      - timestamp:
          source: timestamp
          format: "2006-01-02 15:04:05,000"
